# =============================================================================
# OmniDrop AI — Deploy to app.omnidrop.dev (alpha)
# Triggers on every push to main.
#
# All services (API, worker, frontend) deploy on Render.
# autoDeploy: true in render.yaml handles the actual deploys.
# This workflow runs Supabase migrations first, then confirms Render triggers.
#
# Required GitHub Secrets (set in repo Settings → Secrets → dev environment):
#   SUPABASE_ACCESS_TOKEN      — Supabase personal access token
#   SUPABASE_PROJECT_REF_DEV   — Dev project ref (e.g. abcdefghijklmnop)
#   SUPABASE_DB_PASSWORD_DEV   — Dev database password
#   RENDER_DEPLOY_HOOK_API      — Render deploy hook URL for omnidrop-api
#   RENDER_DEPLOY_HOOK_WORKER   — Render deploy hook URL for omnidrop-worker
#   RENDER_DEPLOY_HOOK_FRONTEND — Render deploy hook URL for omnidrop-frontend
# =============================================================================

name: Deploy to app.omnidrop.dev

on:
  push:
    branches: [main]

# Only run one deploy at a time; cancel any in-progress deploy for this branch.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy to app.omnidrop.dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # 1. Database migrations — always run first so schema is ahead of code
      #    when new service instances start handling requests.
      # -------------------------------------------------------------------------
      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Run database migrations
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF_DEV }} --password ${{ secrets.SUPABASE_DB_PASSWORD_DEV }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # -------------------------------------------------------------------------
      # 2. Trigger Render deploys — all three services (API, worker, frontend).
      #    autoDeploy: true in render.yaml also fires on push, but explicit hooks
      #    let us control order (migrations before service restarts).
      # -------------------------------------------------------------------------
      - name: Trigger Render deploys
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}" > /dev/null
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}" > /dev/null
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" > /dev/null
        continue-on-error: true  # Don't fail if hooks aren't configured yet
