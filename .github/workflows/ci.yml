name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test-python:
    name: Python lint + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [shared, backend, workers]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install shared package
        run: pip install -e ./shared

      - name: Install ${{ matrix.service }} dependencies
        run: |
          pip install -r ${{ matrix.service }}/requirements.txt
          pip install -r ${{ matrix.service }}/requirements-dev.txt
        if: matrix.service != 'shared'

      - name: Install shared dev dependencies
        run: pip install ruff mypy
        if: matrix.service == 'shared'

      - name: Ruff lint
        run: cd ${{ matrix.service }} && ruff check .

      - name: Mypy type check
        run: cd ${{ matrix.service }} && mypy .

      - name: Pytest
        run: cd ${{ matrix.service }} && pytest -v
        if: matrix.service != 'shared'

  lint-and-test-frontend:
    name: Frontend lint + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npx eslint .

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

      - name: Vitest
        run: cd frontend && npx vitest run
