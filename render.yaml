# =============================================================================
# OmniDrop AI — Render.com Infrastructure as Code
# Docs: https://render.com/docs/blueprint-spec
#
# Services defined:
#   1. omnidrop-api      — FastAPI web service (receives Hookdeck webhooks)
#   2. omnidrop-worker   — Celery background worker (document processing)
#   3. omnidrop-redis    — Redis broker + result backend (Render Key Value)
#   4. omnidrop-flower   — Celery monitoring UI (optional, remove for prod)
#
# Deploy: Connect your GitHub repo in the Render dashboard and select this file.
# All services share secrets via envVarGroups defined in the Render dashboard.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # 1. FastAPI Web Service
  #    Receives Hookdeck webhook deliveries and dispatches Celery tasks.
  #    Health check at /health confirms the service is up before routing traffic.
  # ---------------------------------------------------------------------------
  - type: web
    name: omnidrop-api
    runtime: python
    region: oregon
    plan: starter
    branch: main
    buildCommand: pip install ./shared && pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: dev
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CELERY_BROKER_URL
        fromService:
          name: omnidrop-redis
          type: keyValue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: omnidrop-redis
          type: keyValue
          property: connectionString
      # Secrets — set in Render dashboard → Environment Groups → omnidrop-secrets
      - fromGroup: omnidrop-secrets

  # ---------------------------------------------------------------------------
  # 2. Celery Background Worker
  #    Executes the full intake pipeline: Unstructured.io → Claude → Supabase.
  #    Concurrency of 4 is a safe starting point; tune based on job volume.
  # ---------------------------------------------------------------------------
  - type: worker
    name: omnidrop-worker
    runtime: python
    region: oregon
    plan: starter
    branch: main
    buildCommand: pip install ./shared && pip install -r backend/requirements.txt
    startCommand: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=4
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: dev
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CELERY_BROKER_URL
        fromService:
          name: omnidrop-redis
          type: keyValue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: omnidrop-redis
          type: keyValue
          property: connectionString
      - fromGroup: omnidrop-secrets

  # ---------------------------------------------------------------------------
  # 3. Redis (Render Key Value)
  #    Acts as both the Celery task broker and result backend.
  #    maxmemoryPolicy: noeviction ensures queued tasks are never silently dropped.
  # ---------------------------------------------------------------------------
  - type: keyValue
    name: omnidrop-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []   # Only accessible internally to services in this blueprint

  # ---------------------------------------------------------------------------
  # 4. Next.js Frontend
  #    Serves the dashboard at omnidrop.dev.
  #    Custom domain: set omnidrop.dev in Render Dashboard → omnidrop-frontend
  #    → Settings → Custom Domains. Add CNAME at Namecheap pointing @ to
  #    the Render-provided hostname.
  # ---------------------------------------------------------------------------
  - type: web
    name: omnidrop-frontend
    runtime: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_ENV
        value: dev
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://api.omnidrop.dev
      - key: NEXT_PUBLIC_WORKOS_REDIRECT_URI
        value: https://app.omnidrop.dev/callback
      # Secrets — set in Render dashboard → Environment Groups → omnidrop-secrets
      - fromGroup: omnidrop-secrets

  # ---------------------------------------------------------------------------
  # 5. Flower (Celery monitoring) — OPTIONAL
  #    Provides a web UI to inspect task queues, worker status, and task history.
  #    Remove or comment out this service for production deployments where you
  #    don't want to expose a monitoring endpoint publicly.
  # ---------------------------------------------------------------------------
  - type: web
    name: omnidrop-flower
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install ./shared && pip install -r backend/requirements.txt
    startCommand: celery -A backend.workers.celery_app flower --loglevel=info
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CELERY_BROKER_URL
        fromService:
          name: omnidrop-redis
          type: keyValue
          property: connectionString

# =============================================================================
# Environment Group: omnidrop-secrets
# Create this in Render Dashboard → Environment Groups before first deploy.
# Add the following secrets:
#
#   APP_SECRET_KEY
#   APP_BASE_URL            — https://omnidrop.dev (used in bounce-back deep links)
#   SUPABASE_URL
#   SUPABASE_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   ANTHROPIC_API_KEY
#   VOYAGE_API_KEY          — Voyage AI embeddings (voyage-3, 1024-dim)
#   HOOKDECK_SIGNING_SECRET
#   WORKOS_API_KEY
#   WORKOS_CLIENT_ID
#   WORKOS_COOKIE_PASSWORD
#   UNSTRUCTURED_API_KEY
#   SENTRY_PYTHON_DSN
#
# Note: AccuLynx API keys are per-location and stored in Supabase.
#   There is no global ACCULYNX_API_KEY. Location managers enter their keys
#   via the /settings UI; the worker fetches them at task runtime by location_id.
# =============================================================================
